<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · CR Tournament Finder</title>
    <meta name="description" content="Login to CR Tournament Finder">
    <meta name="theme-color" content="#f4d03f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { overflow: auto; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>♛ Tournament Finder</h1>
            <p>Clash Royale tournament search</p>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autofocus required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
